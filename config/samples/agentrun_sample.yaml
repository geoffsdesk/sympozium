---
# Example AgentRun
apiVersion: sympozium.ai/v1alpha1
kind: AgentRun
metadata:
  name: alice-run-001
  namespace: default
spec:
  instanceRef: alice
  agentID: primary
  sessionKey: "session-abc123"
  task: "Review the latest pull request and provide feedback on code quality"
  model:
    name: gemini-2.5-pro
    provider: vertexai
    maxTokens: 128000
  sandbox:
    enabled: true
    image: us-docker.pkg.dev/sympozium/sympozium/sandbox:latest
  skills:
    - code-review
  toolPolicy:
    allowed:
      - read_file
      - grep_search
      - list_dir
    denied:
      - exec_command
    requireApproval:
      - write_file
  timeout: "10m"
  cleanup: OnFailure
