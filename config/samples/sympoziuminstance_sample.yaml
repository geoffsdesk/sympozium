---
# Example SympoziumInstance with Google Chat channel
apiVersion: sympozium.ai/v1alpha1
kind: SympoziumInstance
metadata:
  name: alice
  namespace: default
spec:
  channels:
    - type: googlechat
      secretRef: alice-googlechat-secret
  agents:
    default:
      model: gemini-2.0-flash
      image: us-docker.pkg.dev/sympozium/sympozium/agent-codex:latest
      maxTokens: 128000
    sandbox:
      enabled: true
      image: us-docker.pkg.dev/sympozium/sympozium/sandbox:latest
      resourceLimits:
        cpu: "2"
        memory: 4Gi
    subagents:
      maxDepth: 3
      maxConcurrent: 5
  skills:
    - skillPackRef: k8s-ops
    - name: code-review
    - name: security-audit
  policyRef: default-policy
  authRefs:
    - provider: vertexai
      secretName: alice-gcp-key
  observability:
    enabled: true
    otlpEndpoint: otel-collector.observability.svc:4317
    otlpProtocol: grpc
    serviceName: sympozium
    resourceAttributes:
      deployment.environment: production
      k8s.cluster.name: my-cluster
