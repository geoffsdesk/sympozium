# -- Global image settings
image:
  registry: us-docker.pkg.dev/sympozium/sympozium
  pullPolicy: IfNotPresent
  # -- Override the image tag (defaults to .Chart.AppVersion)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# -- Namespace to deploy into (created if it doesn't exist)
namespace: sympozium-system

# -- Controller (reconciles CRDs, manages agent pods)
controller:
  replicas: 1
  image:
    repository: ""  # defaults to {{ .Values.image.registry }}/controller
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  leaderElect: true
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- API Server (REST API for TUI/CLI and channel deployments)
apiserver:
  replicas: 1
  image:
    repository: ""  # defaults to {{ .Values.image.registry }}/apiserver
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 8080
  # -- Web UI settings
  webUI:
    # -- Enable the embedded web dashboard
    enabled: true
    # -- Bearer token for API/UI authentication.
    # If empty, a random token is generated and stored in a Secret.
    # Retrieve it with: kubectl get secret <release>-ui-token -n <ns> -o jsonpath='{.data.token}' | base64 -d
    token: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Webhook (admission controller for policy enforcement)
webhook:
  enabled: true
  replicas: 2
  image:
    repository: ""  # defaults to {{ .Values.image.registry }}/webhook
    tag: ""
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- NATS (disabled — replaced by Cloud Pub/Sub in this fork)
nats:
  enabled: false
  externalUrl: ""

# -- Google Cloud Pub/Sub (event bus for agent IPC)
pubsub:
  # -- GCP project ID for Pub/Sub
  projectId: ""
  # -- Topic prefix (default: sympozium-)
  topicPrefix: "sympozium-"

# -- cert-manager integration for webhook TLS
certManager:
  # -- Requires cert-manager to be installed in the cluster
  enabled: true
  issuer:
    # -- Use "ClusterIssuer" for cluster-wide, "Issuer" for namespace-scoped
    kind: Issuer
    name: sympozium-selfsigned
    selfSigned: true
  certificate:
    duration: 8760h    # 1 year
    renewBefore: 720h  # 30 days

# -- CRD installation
crds:
  # -- Install CRDs with the chart. Disable if managing CRDs separately.
  install: true

# -- RBAC
rbac:
  # -- Create ClusterRole, ClusterRoleBinding, and ServiceAccounts
  create: true

# -- Network policies for agent pod isolation
networkPolicies:
  # -- Deploy default network policies (deny-all + allow-eventbus for agents)
  enabled: true
  # -- Extra TCP egress ports to allow from agent pods.
  # Use this for clusters where the Kubernetes API server listens on a
  # non-standard port (e.g. k3s with https-listen-port: 6444).
  # Example: [6444]
  extraEgressPorts: []

# -- Default SympoziumPolicies to install (permissive, restrictive, network-isolated)
defaultPolicies:
  # -- Install built-in policy presets
  enabled: true

# -- Default SkillPacks to install (code-review, incident-response, k8s-ops, sre-observability, gcp-gitops, software-dev)
defaultSkills:
  enabled: true
  # -- List of SkillPack specs
  skills: []

# -- Default PersonaPacks to install (developer-team)
defaultPersonas:
  # -- Install built-in persona pack definitions (disabled by default, must be activated after install)
  enabled: true

# -- Pod security context (applied to all control plane pods)
securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context (applied to all control plane containers)
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# -- OpenTelemetry Observability
observability:
  # -- Master switch. When false, all components init noop OTel (zero overhead).
  enabled: false
  # -- OTLP collector endpoint. Example: "http://otel-collector.monitoring.svc:4317"
  endpoint: ""
  # -- OTLP transport: "grpc" (default, port 4317) or "http/protobuf" (port 4318)
  protocol: "grpc"
  # -- Static OTLP export headers (e.g., {"Authorization": "Bearer token"}).
  headers: {}
  # -- Secret reference for sensitive OTLP export headers.
  headersSecretRef: ""
  # -- Trace sampling probability: 0.0 (none) to 1.0 (all).
  samplingRatio: 1.0
  # -- Additional OTel resource attributes applied to ALL components.
  resourceAttributes: {}
  # -- Prefix for service names. Component name is appended.
  serviceNamePrefix: "sympozium"
  # -- Per-component tuning
  controller:
    batchTimeout: "5s"
  agentRunner:
    batchTimeout: "1s"
    shutdownTimeout: "10s"
  apiServer:
    batchTimeout: "5s"
  # -- Built-in OpenTelemetry collector
  collector:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.104.0"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      otlpGrpcPort: 4317
      otlpHttpPort: 4318
      metricsPort: 8889
      healthPort: 13133
  # -- Google Managed Prometheus (GMP) integration.
  # GMP is the default managed Prometheus on GKE. Enable this to create
  # PodMonitoring CRs that auto-scrape the OTel Collector's Prometheus exporter,
  # making Sympozium metrics available via PromQL in Cloud Console and Grafana.
  gmp:
    # -- Enable GMP PodMonitoring and Rules CRDs
    enabled: false
    # -- Scrape interval for PodMonitoring
    scrapeInterval: "30s"
    # -- Alerting rules (GMP Rules CRD)
    alerting:
      enabled: true
      # -- Agent run failure rate threshold for warning alert (0.0 - 1.0)
      failureRateWarning: 0.25
      # -- Agent run failure rate threshold for critical alert (0.0 - 1.0)
      failureRateCritical: 0.50
      # -- Output token budget per hour before critical alert fires
      tokenBudgetPerHour: 2000000
      # -- P95 agent run latency threshold (ms) for warning alert
      p95LatencyThresholdMs: 120000
  # -- Default instance observability settings (used when creating new instances)
  defaultInstance:
    enabled: true
    otlpEndpoint: "sympozium-otel-collector.sympozium-system.svc:4317"
    otlpProtocol: "grpc"
    serviceName: "sympozium"
    resourceAttributes:
      deployment.environment: "cluster"
      k8s.cluster.name: "unknown"

# -- Node Probe (discovers local inference on GKE GPU and TPU nodes)
nodeProbe:
  enabled: true
  image:
    repository: ""  # defaults to {{ .Values.image.registry }}/node-probe
    tag: ""
  config:
    probeInterval: 30s
    targets:
      - name: vllm
        host: localhost
        port: 8000
        healthPath: /health
        modelsPath: /v1/models
      - name: tpu-inference
        host: localhost
        port: 8000
        healthPath: /health
        modelsPath: /v1/models
      - name: tgi
        host: localhost
        port: 8080
        healthPath: /health
        modelsPath: /v1/info
      - name: ollama
        host: localhost
        port: 11434
        healthPath: /api/tags
        modelsPath: /api/tags
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -- Envoy Gateway (shared, cluster-wide)
gateway:
  enabled: false                  # Opt-in: deploys GatewayClass + Gateway
  gatewayClassName: sympozium
  name: sympozium-gateway
  baseDomain: ""                  # e.g. "sympozium.example.com" → instances get <name>.sympozium.example.com
  tls:
    enabled: false
    certManagerClusterIssuer: ""  # e.g. "letsencrypt-prod"
    secretName: sympozium-wildcard-cert

# -- Web Proxy (per-instance, controller-managed)
webProxy:
  image:
    repository: ""                # defaults to <registry>/web-proxy
    tag: ""
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# -- ServiceMonitor for Prometheus (requires prometheus-operator)
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}

# -- GCP-specific configuration
gcp:
  # -- GCP Project ID (used for Vertex AI, Pub/Sub, Cloud SQL, Artifact Registry)
  projectId: ""
  # -- GCP region/location
  location: "us-central1"
  # -- Cloud SQL instance connection name (e.g. project:region:instance)
  cloudSqlInstance: ""
  # -- Artifact Registry repository path
  artifactRegistry: "us-docker.pkg.dev/sympozium/sympozium"
  # -- Workload Identity Federation configuration for keyless GCP auth on GKE
  workloadIdentity:
    # -- Enable Workload Identity (requires GKE cluster with WI enabled)
    enabled: false
    # -- Kubernetes service account name
    serviceAccount: "sympozium-sa"
    # -- GCP IAM service account email (e.g., sympozium@project.iam.gserviceaccount.com)
    gcpServiceAccount: ""
  # -- Secret Manager integration for credential management
  secretManager:
    # -- Enable Google Cloud Secret Manager
    enabled: false
    # -- Prefix for secrets in Secret Manager (e.g., "sympozium-")
    prefix: "sympozium-"
  # -- Cloud SQL Proxy configuration
  cloudSql:
    # -- Enable Cloud SQL Proxy sidecar
    enabled: false
    # -- Instance connection name (e.g., project:region:instance)
    instanceConnectionName: ""
    # -- Database name
    database: "sympozium"
  # -- Artifact Registry configuration
  artifactRegistry:
    # -- Enable Artifact Registry integration
    enabled: true
    # -- Repository path (e.g., us-docker.pkg.dev/project/repo)
    repository: "us-docker.pkg.dev/sympozium/sympozium"
