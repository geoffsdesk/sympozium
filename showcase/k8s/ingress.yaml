# GKE Ingress with Google-managed TLS certificate.
# Routes:
#   /            → portfolio-site (landing page)
#   /sympozium/  → showcase-site (Sympozium showcase)
#   /grafana/    → Grafana (live dashboards)
#
# Prerequisites:
#   - GKE cluster with HTTP(S) load balancing enabled
#   - Static IP reserved: gcloud compute addresses create sympozium-showcase --global
#   - DNS A record pointing your domain to the static IP
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: showcase-cert
  namespace: sympozium-showcase
spec:
  domains:
    - geoffsdesk.com   # e.g., sympozium.yourdomain.dev
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: showcase-backend-config
  namespace: sympozium-showcase
spec:
  healthCheck:
    requestPath: /
    port: 8080
  cdn:
    enabled: true
    cachePolicy:
      includeHost: true
      includeProtocol: true
      includeQueryString: false
  securityPolicy:
    name: ""  # Optional: Cloud Armor policy name
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: showcase-ingress
  namespace: sympozium-showcase
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "sympozium-showcase"
    networking.gke.io/managed-certificates: "showcase-cert"
    # Allow HTTP while TLS provisions (Google-managed cert needs HTTP challenge)
    kubernetes.io/ingress.allow-http: "true"
spec:
  rules:
    - host: geoffsdesk.com
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          - path: /sympozium
            pathType: Prefix
            backend:
              service:
                name: showcase-site
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-site
                port:
                  number: 80
