<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" width="720" height="900">
  <defs>
    <linearGradient id="gcp-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="100%" style="stop-color:#34A853"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      .layer-bg { fill: #1a1d27; stroke: #2e3343; stroke-width: 1.5; rx: 12; }
      .component { fill: #242836; stroke: #3a3f52; stroke-width: 1; rx: 8; }
      .component:hover { stroke: #4285F4; stroke-width: 2; }
      .label { fill: #e8eaed; font-family: Inter, -apple-system, sans-serif; font-size: 13px; font-weight: 600; }
      .sublabel { fill: #9aa0a6; font-family: Inter, -apple-system, sans-serif; font-size: 10px; }
      .layer-label { fill: #9aa0a6; font-family: Inter, -apple-system, sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
      .arrow { stroke: #4a4f62; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .gcp-blue { fill: #4285F4; }
      .gcp-green { fill: #34A853; }
      .gcp-yellow { fill: #FBBC04; }
      .gcp-red { fill: #EA4335; }
      .dot { r: 4; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" fill="#4a4f62">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="900" fill="#0f1117" rx="16"/>

  <!-- ==================== LAYER 1: Ingress ==================== -->
  <text x="360" y="30" text-anchor="middle" class="layer-label">Ingress</text>
  <rect x="240" y="40" width="240" height="50" class="component" filter="url(#shadow)"/>
  <circle cx="268" cy="65" class="dot gcp-blue"/>
  <text x="280" y="70" class="label">GKE Ingress + TLS</text>
  <text x="280" y="82" class="sublabel">Google-managed certificate</text>

  <!-- Arrow down -->
  <line x1="360" y1="90" x2="360" y2="115" class="arrow"/>

  <!-- ==================== LAYER 2: Control Plane ==================== -->
  <rect x="20" y="115" width="680" height="120" class="layer-bg"/>
  <text x="40" y="138" class="layer-label">Control Plane</text>

  <rect x="40" y="148" width="145" height="72" class="component"/>
  <circle cx="58" cy="172" class="dot gcp-blue"/>
  <text x="70" y="177" class="label">Controller</text>
  <text x="70" y="192" class="sublabel">Reconcile loops</text>
  <text x="70" y="204" class="sublabel">CRD management</text>

  <rect x="200" y="148" width="145" height="72" class="component"/>
  <circle cx="218" cy="172" class="dot gcp-green"/>
  <text x="230" y="177" class="label">API Server</text>
  <text x="230" y="192" class="sublabel">REST + Web UI</text>
  <text x="230" y="204" class="sublabel">Agent management</text>

  <rect x="360" y="148" width="145" height="72" class="component"/>
  <circle cx="378" cy="172" class="dot gcp-yellow"/>
  <text x="390" y="177" class="label">Webhook</text>
  <text x="390" y="192" class="sublabel">Admission control</text>
  <text x="390" y="204" class="sublabel">Policy enforcement</text>

  <rect x="520" y="148" width="160" height="72" class="component"/>
  <circle cx="538" cy="172" class="dot gcp-red"/>
  <text x="550" y="177" class="label">Web Proxy</text>
  <text x="550" y="192" class="sublabel">OpenAI-compatible</text>
  <text x="550" y="204" class="sublabel">gateway endpoint</text>

  <!-- Arrow down -->
  <line x1="360" y1="235" x2="360" y2="260" class="arrow"/>

  <!-- ==================== LAYER 3: Event Bus ==================== -->
  <rect x="140" y="260" width="440" height="60" class="component" filter="url(#shadow)"/>
  <circle cx="168" cy="290" class="dot gcp-blue"/>
  <text x="182" y="295" class="label">Cloud Pub/Sub</text>
  <text x="330" y="295" class="sublabel">Event bus · Trace propagation · At-least-once delivery</text>

  <!-- Arrows down (two) -->
  <line x1="300" y1="320" x2="300" y2="355" class="arrow"/>
  <line x1="420" y1="320" x2="420" y2="355" class="arrow"/>

  <!-- ==================== LAYER 4: Agent Pods ==================== -->
  <rect x="20" y="355" width="680" height="110" class="layer-bg"/>
  <text x="40" y="378" class="layer-label">Agent Pods (Ephemeral Jobs)</text>

  <rect x="40" y="388" width="190" height="62" class="component"/>
  <circle cx="58" cy="412" class="dot gcp-blue"/>
  <text x="70" y="417" class="label">Agent Runner</text>
  <text x="70" y="432" class="sublabel">Gemini API · Prompt execution</text>

  <rect x="250" y="388" width="190" height="62" class="component"/>
  <circle cx="268" cy="412" class="dot gcp-green"/>
  <text x="280" y="417" class="label">Skill Sidecar</text>
  <text x="280" y="432" class="sublabel">gcloud · bq · gsutil · custom</text>

  <rect x="460" y="388" width="220" height="62" class="component"/>
  <circle cx="478" cy="412" class="dot gcp-yellow"/>
  <text x="490" y="417" class="label">Tool Sidecar</text>
  <text x="490" y="432" class="sublabel">kubectl · APIs · file systems</text>

  <!-- Arrow down -->
  <line x1="360" y1="465" x2="360" y2="495" class="arrow"/>

  <!-- ==================== LAYER 5: Inference ==================== -->
  <rect x="20" y="495" width="680" height="110" class="layer-bg"/>
  <text x="40" y="518" class="layer-label">Inference Layer</text>

  <rect x="40" y="528" width="200" height="62" class="component"/>
  <circle cx="58" cy="552" class="dot gcp-blue"/>
  <text x="70" y="557" class="label">Vertex AI Gemini</text>
  <text x="70" y="572" class="sublabel">Flash · Pro · Preview tiers</text>

  <rect x="260" y="528" width="210" height="62" class="component"/>
  <circle cx="278" cy="552" class="dot gcp-green"/>
  <text x="290" y="557" class="label">Self-Hosted Gemma 3</text>
  <text x="290" y="572" class="sublabel">vLLM / TGI on GPU + TPU v5e</text>

  <rect x="490" y="528" width="190" height="62" class="component"/>
  <circle cx="508" cy="552" class="dot gcp-yellow"/>
  <text x="520" y="557" class="label">Node Probe</text>
  <text x="520" y="572" class="sublabel">DaemonSet · GPU/TPU discovery</text>

  <!-- Arrow down -->
  <line x1="360" y1="605" x2="360" y2="635" class="arrow"/>

  <!-- ==================== LAYER 6: Observability ==================== -->
  <rect x="20" y="635" width="680" height="80" class="layer-bg"/>
  <text x="40" y="658" class="layer-label">Observability</text>

  <rect x="40" y="668" width="155" height="36" class="component"/>
  <circle cx="55" cy="686" class="dot gcp-blue"/>
  <text x="67" y="691" class="label" font-size="12">OTel Collector</text>

  <rect x="210" y="668" width="140" height="36" class="component"/>
  <circle cx="225" cy="686" class="dot gcp-green"/>
  <text x="237" y="691" class="label" font-size="12">Cloud Trace</text>

  <rect x="365" y="668" width="160" height="36" class="component"/>
  <circle cx="380" cy="686" class="dot gcp-yellow"/>
  <text x="392" y="691" class="label" font-size="12">Managed Prom</text>

  <rect x="540" y="668" width="140" height="36" class="component"/>
  <circle cx="555" cy="686" class="dot gcp-red"/>
  <text x="567" y="691" class="label" font-size="12">Grafana</text>

  <!-- Arrows between observability -->
  <line x1="195" y1="686" x2="210" y2="686" class="arrow"/>
  <line x1="350" y1="686" x2="365" y2="686" class="arrow"/>
  <line x1="525" y1="686" x2="540" y2="686" class="arrow"/>

  <!-- Arrow down -->
  <line x1="360" y1="715" x2="360" y2="740" class="arrow"/>

  <!-- ==================== LAYER 7: Data & Storage ==================== -->
  <rect x="20" y="740" width="440" height="70" class="layer-bg"/>
  <text x="40" y="763" class="layer-label">Data &amp; Storage</text>

  <rect x="40" y="773" width="125" height="28" class="component"/>
  <circle cx="55" cy="787" class="dot gcp-blue"/>
  <text x="67" y="792" class="label" font-size="11">Cloud SQL</text>

  <rect x="180" y="773" width="125" height="28" class="component"/>
  <circle cx="195" cy="787" class="dot gcp-green"/>
  <text x="207" y="792" class="label" font-size="11">Firestore</text>

  <rect x="320" y="773" width="125" height="28" class="component"/>
  <circle cx="335" cy="787" class="dot gcp-yellow"/>
  <text x="347" y="792" class="label" font-size="11">Secret Mgr</text>

  <!-- ==================== LAYER 8: Channels ==================== -->
  <rect x="480" y="740" width="220" height="70" class="layer-bg"/>
  <text x="500" y="763" class="layer-label">Channels</text>

  <rect x="500" y="773" width="85" height="28" class="component"/>
  <circle cx="512" cy="787" class="dot gcp-blue"/>
  <text x="521" y="792" class="label" font-size="11">G Chat</text>

  <rect x="600" y="773" width="85" height="28" class="component"/>
  <circle cx="612" cy="787" class="dot gcp-green"/>
  <text x="621" y="792" class="label" font-size="11">Discord</text>

  <!-- ==================== LAYER 9: CI/CD ==================== -->
  <rect x="20" y="830" width="680" height="55" class="layer-bg"/>
  <text x="40" y="853" class="layer-label">CI / CD</text>

  <rect x="200" y="843" width="150" height="32" class="component"/>
  <circle cx="218" cy="859" class="dot gcp-blue"/>
  <text x="230" y="864" class="label" font-size="12">Cloud Build</text>

  <rect x="370" y="843" width="170" height="32" class="component"/>
  <circle cx="388" cy="859" class="dot gcp-green"/>
  <text x="400" y="864" class="label" font-size="12">Artifact Registry</text>
</svg>
