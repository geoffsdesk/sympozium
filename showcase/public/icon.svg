<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4"/>
      <stop offset="33%" style="stop-color:#34A853"/>
      <stop offset="66%" style="stop-color:#FBBC04"/>
      <stop offset="100%" style="stop-color:#EA4335"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#1a1f2e"/>
  <!-- Orchestration nodes: 3 connected circles -->
  <circle cx="64" cy="36" r="14" fill="none" stroke="url(#g)" stroke-width="3"/>
  <circle cx="38" cy="88" r="14" fill="none" stroke="url(#g)" stroke-width="3"/>
  <circle cx="90" cy="88" r="14" fill="none" stroke="url(#g)" stroke-width="3"/>
  <!-- Connection lines -->
  <line x1="54" y1="48" x2="44" y2="76" stroke="url(#g)" stroke-width="2.5" opacity="0.7"/>
  <line x1="74" y1="48" x2="84" y2="76" stroke="url(#g)" stroke-width="2.5" opacity="0.7"/>
  <line x1="52" y1="88" x2="76" y2="88" stroke="url(#g)" stroke-width="2.5" opacity="0.7"/>
  <!-- Center dots (agents) -->
  <circle cx="64" cy="36" r="5" fill="#4285F4"/>
  <circle cx="38" cy="88" r="5" fill="#34A853"/>
  <circle cx="90" cy="88" r="5" fill="#FBBC04"/>
</svg>
