apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-site
  namespace: sympozium-showcase
  labels:
    app.kubernetes.io/name: portfolio-site
    app.kubernetes.io/part-of: geoffsdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-site
        app.kubernetes.io/part-of: geoffsdesk
    spec:
      containers:
        - name: portfolio
          image: us-docker.pkg.dev/first-cascade-490202-e3/sympozium/portfolio-site:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-site
  namespace: sympozium-showcase
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: portfolio-site
  ports:
    - name: http
      port: 80
      targetPort: http
